name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Create the release first so all build jobs can upload to it
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Murmur ${{ github.ref_name }}" \
            --notes "See the assets below to download and install." \
            2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
            label: macos-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: none
            label: windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            label: linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      # ── macOS & Linux: build with tauri, upload manually ──
      - name: Build Tauri app
        if: matrix.target != 'x86_64-pc-windows-msvc'
        run: bun tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload macOS dmg
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        run: |
          DMG=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name '*.dmg' | head -1)
          gh release upload "${{ github.ref_name }}" "$DMG#Murmur_${{ github.ref_name }}_${{ matrix.label }}.dmg" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux deb
        if: matrix.label == 'linux-x64'
        shell: bash
        run: |
          DEB=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name '*.deb' | head -1)
          gh release upload "${{ github.ref_name }}" "$DEB#Murmur_${{ github.ref_name }}_${{ matrix.label }}.deb" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux AppImage
        if: matrix.label == 'linux-x64'
        shell: bash
        run: |
          AI=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name '*.AppImage' | head -1)
          gh release upload "${{ github.ref_name }}" "$AI#Murmur_${{ github.ref_name }}_${{ matrix.label }}.AppImage" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Windows: cargo build + portable zip ──
      - name: Build frontend
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: bun run build

      - name: Build Tauri (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: src-tauri

      - name: Download WebView2 Bootstrapper
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "MicrosoftEdgeWebview2Setup.exe"

      - name: Package Windows portable
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          Compress-Archive -Path "src-tauri/target/${{ matrix.target }}/release/Murmur.exe","MicrosoftEdgeWebview2Setup.exe" -DestinationPath "Murmur_${{ github.ref_name }}_windows-x64-portable.zip"

      - name: Upload Windows portable
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" "Murmur_${{ github.ref_name }}_windows-x64-portable.zip" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
