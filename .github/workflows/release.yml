name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS - Apple Silicon
          - platform: macos-latest
            target: aarch64-apple-darwin
          # macOS - Intel
          - platform: macos-latest
            target: x86_64-apple-darwin
          # Windows - portable only
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      # Non-Windows: use tauri-action to build + upload installers
      - name: Build Tauri app
        if: matrix.target != 'x86_64-pc-windows-msvc'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Murmur ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      # Windows: build with cargo, then zip the exe as portable
      - name: Build frontend
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: bun run build

      - name: Build Tauri (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: src-tauri

      - name: Package Windows portable
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          Compress-Archive -Path "src-tauri/target/${{ matrix.target }}/release/Murmur.exe" -DestinationPath "Murmur_${{ github.ref_name }}_windows-portable.zip"

      - name: Upload Windows portable to release
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" --title "Murmur ${{ github.ref_name }}" --notes "See the assets below to download and install." --generate-notes 2>/dev/null || true
          gh release upload "${{ github.ref_name }}" "Murmur_${{ github.ref_name }}_windows-portable.zip" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
