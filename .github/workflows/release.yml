name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Create the release first so all build jobs can upload to it
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Murmur ${{ github.ref_name }}" \
            --notes "See the assets below to download and install." \
            2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
            label: macos-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: none
            label: windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            label: linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      # ── macOS: import signing certificate ──
      - name: Import Apple certificate
        if: contains(matrix.target, 'apple-darwin')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euxo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db

          echo "=== Step 1: Create keychain ==="
          security create-keychain -p "ci" "$KEYCHAIN_PATH"

          echo "=== Step 2: Set as default keychain ==="
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "=== Step 3: Set keychain settings ==="
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"

          echo "=== Step 4: Unlock keychain ==="
          security unlock-keychain -p "ci" "$KEYCHAIN_PATH"

          echo "=== Step 5: Decode certificate ==="
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          ls -la $RUNNER_TEMP/cert.p12
          echo "Certificate file size: $(wc -c < $RUNNER_TEMP/cert.p12) bytes"

          echo "=== Step 6: Import certificate ==="
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          echo "Import exit code: $?"

          echo "=== Step 7: Set partition list ==="
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "ci" "$KEYCHAIN_PATH"
          echo "Partition list exit code: $?"

          echo "=== Step 8: Set keychain search list ==="
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          echo "Current keychain search list:"
          security list-keychains -d user

          echo "=== Step 9: Verify default keychain ==="
          security default-keychain

          echo "=== Step 10: Find codesigning identities in build keychain ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "=== Step 11: Find codesigning identities in ALL keychains ==="
          security find-identity -v -p codesigning

          echo "=== Step 12: Dump all identities (no filter) ==="
          security find-identity -v "$KEYCHAIN_PATH"

          echo "=== Step 13: Verify keychain is still unlocked ==="
          security show-keychain-info "$KEYCHAIN_PATH"

      - name: Verify codesign before build
        if: contains(matrix.target, 'apple-darwin')
        run: |
          set -euxo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db

          echo "=== Keychain search list ==="
          security list-keychains -d user

          echo "=== Default keychain ==="
          security default-keychain

          echo "=== Unlock keychain again (in case of timeout) ==="
          security unlock-keychain -p "ci" "$KEYCHAIN_PATH"

          echo "=== Codesigning identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning

          echo "=== Test codesign with a dummy file ==="
          echo "test" > /tmp/test_sign_file
          codesign --sign "Developer ID Application: Lin Mo (9V2W2U87ZG)" --keychain "$KEYCHAIN_PATH" /tmp/test_sign_file && echo "Test sign SUCCESS" || echo "Test sign FAILED"

      # ── macOS & Linux: build with tauri, upload manually ──
      - name: Build Tauri app (macOS)
        if: contains(matrix.target, 'apple-darwin')
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Lin Mo (9V2W2U87ZG)"
          APPLE_KEYCHAIN: ${{ runner.temp }}/build.keychain-db
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euxo pipefail
          echo "=== Pre-build: unlock keychain ==="
          security unlock-keychain -p "ci" "$APPLE_KEYCHAIN"
          security find-identity -v -p codesigning "$APPLE_KEYCHAIN"
          echo "=== Starting Tauri build ==="
          bun tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} -v

      - name: Build Tauri app (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: bun tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload macOS dmg
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        run: |
          DMG=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name '*.dmg' | head -1)
          gh release upload "${{ github.ref_name }}" "$DMG#Murmur_${{ github.ref_name }}_${{ matrix.label }}.dmg" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux deb
        if: matrix.label == 'linux-x64'
        shell: bash
        run: |
          DEB=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name '*.deb' | head -1)
          gh release upload "${{ github.ref_name }}" "$DEB#Murmur_${{ github.ref_name }}_${{ matrix.label }}.deb" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux AppImage
        if: matrix.label == 'linux-x64'
        shell: bash
        run: |
          AI=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name '*.AppImage' | head -1)
          gh release upload "${{ github.ref_name }}" "$AI#Murmur_${{ github.ref_name }}_${{ matrix.label }}.AppImage" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Windows: cargo build + portable zip ──
      - name: Build frontend
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: bun run build

      - name: Build Tauri (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: src-tauri

      - name: Download WebView2 Bootstrapper
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "MicrosoftEdgeWebview2Setup.exe"

      - name: Package Windows portable
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          Compress-Archive -Path "src-tauri/target/${{ matrix.target }}/release/Murmur.exe","MicrosoftEdgeWebview2Setup.exe" -DestinationPath "Murmur_${{ github.ref_name }}_windows-x64-portable.zip"

      - name: Upload Windows portable
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" "Murmur_${{ github.ref_name }}_windows-x64-portable.zip" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
